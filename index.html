<!DOCTYPE html>
<html lang="en">
  <head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
	<meta name="theme-color" content="#667eea"/>
	<title>🛒 Shalini's Grocery List</title>

	<!-- ✅ Firebase Compat SDKs (Required for script.js) -->
	<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

	<!-- ✅ Google Fonts & Icons -->
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

	<!-- ✅ Internal CSS (Styling) -->
<style>
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --success: #2ed573;
      --danger: #ff4757;
      --warning: #ffa502;
      --dark: #2f3542;
      --light: #f8f9ff;
      --gray: #747d8c;
      --shadow: 0 10px 40px rgba(0,0,0,0.15);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      color: var(--dark);
      line-height: 1.5;
    }

    /* Main Container */
    .app-container {
      max-width: 100%;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;      border-radius: 0;
    }

    @media (min-width: 768px) {
      .app-container {
        max-width: 700px;
        margin: 20px auto;
        border-radius: var(--radius);
        min-height: auto;
        box-shadow: var(--shadow);
      }
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
      color: white;
      padding: 20px 16px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .header p {
      font-size: 0.85rem;
      opacity: 0.95;
    }

    /* Connection Status Bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      margin-top: 8px;
      font-size: 0.8rem;    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warning);
      animation: pulse 1.5s infinite;
    }

    .status-dot.connected {
      background: var(--success);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    /* Form Section */
    .form-section {
      padding: 16px;
      background: var(--light);
      border-bottom: 1px solid #eee;
    }

    .form-card {
      background: white;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      position: relative;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--dark);
    }

    .form-group input {      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.2s;
      background: #fafafa;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      font-size: 1.05rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      -webkit-appearance: none;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary { background: #555; color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    /* Actions Bar */
    .actions-bar {
      display: grid;      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    @media (max-width: 400px) {
      .actions-bar { grid-template-columns: 1fr; }
    }

    .actions-bar .btn { padding: 12px; font-size: 0.95rem; min-height: 48px; }

    /* List Section (Display Area) */
    .list-header {
      padding: 16px 16px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .list-header h3 { font-size: 1.1rem; font-weight: 600; }

    .item-count {
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .list-section {
      padding: 8px 16px 20px;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      min-height: 300px; /* Proper display space */
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray);
    }

    .empty-state i {
      font-size: 3.5rem;
      margin-bottom: 16px;
      opacity: 0.4;      display: block;
    }

    /* Grocery Item Card */
    .grocery-item {
      background: white;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid var(--primary);
      box-shadow: 0 3px 12px rgba(0,0,0,0.06);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .grocery-item:active { transform: scale(0.995); }

    .item-info { flex: 1; min-width: 0; padding-right: 10px; }

    .item-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: var(--dark);
      margin-bottom: 4px;
      word-wrap: break-word;
    }

    .item-details {
      font-size: 0.9rem;
      color: var(--gray);
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
    }

    .item-details span { display: flex; align-items: center; gap: 4px; }

    .item-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      padding: 0;      border: none;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-appearance: none;
    }

    .btn-icon:active { transform: scale(0.92); }
    .btn-edit { background: #e3f2fd; color: #1976d2; }
    .btn-delete { background: #ffebee; color: var(--danger); }

    /* Loading & Toast */
    .loading {
      text-align: center;
      padding: 30px 20px;
      color: var(--gray);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .loading i {
      font-size: 2rem;
      animation: spin 1s linear infinite;
      color: var(--primary);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 16px;
      right: 16px;
      background: var(--dark);
      color: white;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      z-index: 1000;
      font-weight: 500;
      display: none;
      animation: slideUp 0.3s ease;
      max-width: 400px;
      margin: 0 auto;
      left: 50%;
      transform: translateX(-50%);
    }

    @media (min-width: 768px) {      .toast { left: auto; right: 20px; transform: none; max-width: 350px; }
    }

    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }
    .toast.warning { background: var(--warning); color: var(--dark); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Edit Mode */
    .edit-mode .form-card {
      border: 2px solid var(--warning);
      box-shadow: 0 0 0 4px rgba(255, 165, 2, 0.15);
    }

    .edit-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--warning);
      color: var(--dark);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .hidden { display: none !important; }
    .mt-2 { margin-top: 8px; }
</style>
  </head>
  <body>
	<div class="app-container">

	  <!-- Header -->
	  <header class="header">
		<h1><i class="fas fa-shopping-basket"></i> Shalini Grocery</h1>
		<p>Smart Shopping List Manager</p>
		<div class="status-bar">
		  <div class="status-dot" id="statusDot"></div>
		  <span id="statusText">Connecting to Firebase...</span>
		</div>
	  </header>

	  <!-- Form Section -->
	  <section class="form-section">      <div class="form-card" id="formCard">
		  <form id="groceryForm">
			<div class="form-grid">
			  <div class="form-group">
				<label for="itemName">📦 Item Name *</label>
				<input type="text" id="itemName" placeholder="e.g., Milk, Rice, Eggs" required autocomplete="off" />
			  </div>
			  <div class="form-group">
				<label for="itemQty">🔢 Quantity *</label>
				<input type="number" id="itemQty" placeholder="e.g., 2, 5, 10" min="1" required inputmode="numeric" />
			  </div>
			  <div class="form-group">
				<label for="itemWeight">⚖️ Weight (Optional)</label>
				<input type="text" id="itemWeight" placeholder="e.g., 500g, 1kg, 2L" autocomplete="off" />
			  </div>
			</div>
			<button type="submit" class="btn btn-primary" id="addBtn">
			  <i class="fas fa-plus-circle"></i> <span id="btnText">Add to List</span>
			</button>
		  </form>
		</div>
	  </section>

	  <!-- Actions Bar -->
	  <div class="actions-bar">
		<button class="btn btn-outline" id="refreshBtn">
		  <i class="fas fa-sync-alt"></i> Refresh
		</button>
		<button class="btn btn-danger" id="deleteAllBtn">
		  <i class="fas fa-trash-alt"></i> Delete All
		</button>
	  </div>

	  <!-- List Display Section -->
	  <div class="list-header">
		<h3>📋 Your Items</h3>
		<span class="item-count" id="itemCount">0 items</span>
	  </div>

	  <main class="list-section" id="listContainer">
		<div class="loading">
		  <i class="fas fa-spinner"></i>
		  <span>Loading your grocery list...</span>
		</div>
	  </main>

	</div>

	<!-- Toast Notification -->
	<div class="toast" id="toast" role="alert" aria-live="polite"></div>
	<!-- ✅ Main Script (Separate File) -->
	<script src="script.js"></script>
  </body>
</html>
